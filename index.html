<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>HOST.pdf</title>
    <style>
      :root {
        --bg: #f5f4ef;
        --surface: #ffffff;
        --text: #1b1b1f;
        --muted: #5c6068;
        --line: #d7d3c8;
        --accent: #0f6b6e;
        --accent-strong: #0a4f52;
        --shadow: 0 18px 45px rgb(27 27 31 / 0.14);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #161719;
          --surface: #222428;
          --text: #f2f2f0;
          --muted: #b6b8bd;
          --line: #393c42;
          --accent: #6fc7c2;
          --accent-strong: #9adad6;
          --shadow: 0 18px 45px rgb(0 0 0 / 0.32);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 320px;
        background:
          linear-gradient(180deg, rgb(15 107 110 / 0.08), transparent 220px),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 72px;
        padding: 14px clamp(16px, 4vw, 36px);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface) 88%, transparent);
        backdrop-filter: blur(14px);
      }

      .title {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 720;
      }

      .meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      a.button,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
        cursor: pointer;
      }

      a.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      @media (prefers-color-scheme: dark) {
        a.primary {
          color: #071f21;
        }
      }

      a.button:hover,
      button:hover {
        border-color: var(--accent-strong);
      }

      main {
        min-height: 0;
        padding: clamp(10px, 2vw, 22px);
      }

      .viewer {
        height: 100%;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        min-height: inherit;
        border: 0;
        background: var(--surface);
      }

      .fallback {
        display: none;
        padding: 28px;
        color: var(--muted);
        line-height: 1.5;
      }

      .no-pdf iframe {
        display: none;
      }

      .no-pdf .fallback {
        display: block;
      }

      @media (max-width: 620px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        nav {
          justify-content: stretch;
          width: 100%;
        }

        a.button,
        button {
          flex: 1 1 112px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        <h1>HOST.pdf</h1>
        <div class="meta">16 pages - 4.7 MB</div>
      </div>
      <nav aria-label="Document actions">
        <a class="button primary" href="HOST.pdf" target="_blank" rel="noopener">Open PDF</a>
        <a class="button" href="HOST.pdf" download>Download</a>
        <button type="button" id="print">Print</button>
      </nav>
    </header>
    <main>
      <section class="viewer" aria-label="PDF viewer">
        <iframe id="pdf-frame" title="HOST.pdf" src="HOST.pdf#view=FitH"></iframe>
        <div class="fallback">
          This browser is not showing the inline PDF viewer. Use Open PDF or Download above.
        </div>
      </section>
    </main>
    <script>
      const frame = document.getElementById("pdf-frame");
      const printButton = document.getElementById("print");

      printButton.addEventListener("click", () => {
        try {
          frame.contentWindow.focus();
          frame.contentWindow.print();
        } catch {
          window.open("HOST.pdf", "_blank", "noopener");
        }
      });

      window.setTimeout(() => {
        if (!frame.contentWindow) {
          document.documentElement.classList.add("no-pdf");
        }
      }, 1200);
    </script>
  </body>
</html>
